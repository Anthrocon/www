name: Deploy Hugo pages

on:
  push:
  schedule:
    - cron: 0 0 * * *
      timezone: America/New_York

jobs:
  call:
    name: Call workflow
    uses: Anthrocon/.github/workflows/deploy.yaml@main
    with:
      cloudflare-project: anthrocon
      hugo-version: 0.164.0

    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
